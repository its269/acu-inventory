# =============================================================
#  Nginx — acu-inventory  (Next.js 16 Production)
#  Drop this file at: /etc/nginx/sites-available/acu-inventory
#  Then: ln -s /etc/nginx/sites-available/acu-inventory /etc/nginx/sites-enabled/
#  Reload: nginx -t && systemctl reload nginx
# =============================================================

# ── Worker tuning ─────────────────────────────────────────────
# Set to number of CPU cores on your server (auto = detect)
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept       on;
    use                epoll;        # Linux only (best I/O model)
}

http {
    # ── Mime types ───────────────────────────────────────────
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Core performance ─────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;           # Batch TCP packets (pairs with sendfile)
    tcp_nodelay        on;           # Low-latency for keep-alive connections
    keepalive_timeout  65;
    keepalive_requests 1000;

    # ── Buffer tuning ────────────────────────────────────────
    client_body_buffer_size    128k;
    client_max_body_size       10m;
    client_header_buffer_size  1k;
    large_client_header_buffers 4 16k;
    output_buffers             1 32k;
    postpone_output            1460;

    # ── Gzip compression ─────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;            # Sweet-spot: speed vs ratio
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;          # Don't compress tiny responses
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/ttf
        font/opentype
        application/vnd.ms-fontobject;

    # ── Open file cache ──────────────────────────────────────
    open_file_cache          max=10000 inactive=30s;
    open_file_cache_valid    60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors   on;

    # ── Logging ──────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/acu-inventory.access.log main buffer=16k flush=5s;
    error_log  /var/log/nginx/acu-inventory.error.log  warn;

    # ── Upstream: Next.js Node process ───────────────────────
    upstream nextjs {
        server 127.0.0.1:3000;
        keepalive 32;               # Reuse connections to Node — big win
    }

    # ── HTTP → HTTPS redirect ────────────────────────────────
    server {
        listen      80;
        listen      [::]:80;
        server_name your-domain.com www.your-domain.com;

        # Allow Let's Encrypt ACME challenges
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS Main Server ─────────────────────────────────────
    server {
        listen      443 ssl;
        listen      [::]:443 ssl;
        http2       on;             # HTTP/2 — multiplexed, header compressed
        server_name your-domain.com www.your-domain.com;

        # ── SSL/TLS ──────────────────────────────────────────
        ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;

        # OCSP stapling — faster TLS handshake
        ssl_stapling        on;
        ssl_stapling_verify on;
        resolver            8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout    5s;

        # ── Security headers ─────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff"                                      always;
        add_header X-Frame-Options           "SAMEORIGIN"                                   always;
        add_header X-XSS-Protection          "1; mode=block"                                always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;

        # ── Serve Next.js static chunks directly from disk ───
        # These are content-hashed → safe to cache for 1 year
        location /_next/static/ {
            alias /path/to/acu-inventory/.next/static/;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;        # No need to log static hits
        }

        # ── Serve /public folder directly ────────────────────
        location /public/ {
            alias /path/to/acu-inventory/public/;
            expires 1d;
            add_header Cache-Control "public, max-age=86400, stale-while-revalidate=604800";
            access_log off;
        }

        # ── Favicon & robots directly ────────────────────────
        location = /favicon.ico {
            alias /path/to/acu-inventory/public/favicon.ico;
            expires 7d;
            access_log off;
        }

        location = /robots.txt {
            alias /path/to/acu-inventory/public/robots.txt;
            access_log off;
        }

        # ── Proxy everything else to Next.js ─────────────────
        location / {
            proxy_pass         http://nextjs;
            proxy_http_version 1.1;

            # WebSocket & keep-alive support
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Pass real client info
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout  10s;
            proxy_send_timeout     60s;
            proxy_read_timeout     60s;

            # Buffering — improves throughput for slow clients
            proxy_buffering          on;
            proxy_buffer_size        8k;
            proxy_buffers            8 32k;
            proxy_busy_buffers_size  64k;
        }
    }
}
