name: AI Code Reviewer

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Ito ang step na tatawag sa Gemini para mag-review
      - name: Gemini Code Review
        uses: google-gemini/gemini-github-action@v1
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            You are an AI Code Reviewer. Review the following PR changes.
            Focus on:
            - Security (Acumatica credentials)
            - Next.js Streaming BFF patterns
            - Vanilla CSS modularity
            Please provide comments on specific lines if possible.
